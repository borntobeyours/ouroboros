name: Strikingly Subdomain Takeover
description: Detects a dangling CNAME pointing to a Strikingly-hosted site whose custom domain mapping has been removed. An attacker can create a Strikingly site and associate the victim's domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "page not found"
  - body_contains: "strikingly.com"
  - status_code: 404
