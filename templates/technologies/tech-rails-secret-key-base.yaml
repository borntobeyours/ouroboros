name: Rails secret_key_base Exposure
description: Detects exposure of Rails secret_key_base in configuration files, environment variables, or debug output. This secret is used to sign session cookies; its exposure allows complete session forgery and privilege escalation.
severity: critical
cwe: CWE-321

requests:
  - method: GET
    path: /config/secrets.yml
  - method: GET
    path: /.env

matchers:
  - body_contains: "secret_key_base"
  - regex: "secret_key_base:\\s*[a-f0-9]{64,}"
  - status_code: 200
