name: FeedPress Feed Subdomain Takeover
description: Detects a dangling CNAME pointing to a FeedPress feed that has been deleted. An attacker can register the same feed slug on FeedPress and control the feed content served from the victim's subdomain.
severity: medium
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "The feed has not been found."
  - body_contains: "feedpress"
  - status_code: 404
