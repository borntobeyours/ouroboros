name: Squarespace Subdomain Takeover
description: Detects a dangling CNAME pointing to a Squarespace site that has been deleted or suspended. An attacker can associate the victim's domain with a new or existing Squarespace account.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "No Such Account"
  - body_contains: "squarespace.com"
  - status_code: 404
