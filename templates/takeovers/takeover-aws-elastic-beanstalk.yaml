name: AWS Elastic Beanstalk Subdomain Takeover
description: Detects a dangling CNAME pointing to an AWS Elastic Beanstalk environment that no longer exists. An attacker can register the same environment name and serve malicious content.
severity: high
tags:
  - aws
  - cloud
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "404 Not Found"
  - body_contains: "No Application"
  - status_code: 404
