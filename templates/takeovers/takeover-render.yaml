name: Render Subdomain Takeover
description: Detects a dangling CNAME pointing to a Render.com service that has been deleted or the custom domain removed. An attacker can create a new Render service and attach the victim's domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "service not found"
  - body_contains: "Page Not Found"
  - body_contains: "onrender.com"
  - status_code: 404
