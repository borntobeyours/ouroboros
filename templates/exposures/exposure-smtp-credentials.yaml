name: SMTP Credentials Exposure
description: Detects exposed SMTP credentials in HTTP responses. Leaked SMTP username and password allow sending emails through the victim's mail server, enabling phishing and spam.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "(?i)MAIL_PASSWORD[\\s=:\"']+\\S{6,}"
  - regex: "(?i)smtp.{0,20}password[\\s=:\"']+\\S{6,}"
  - regex: "(?i)SMTP_PASS(?:WORD)?[\\s=:\"']+\\S{6,}"

extractors:
  - name: smtp_password
    regex: "(?i)(?:MAIL_PASSWORD|SMTP_PASS(?:WORD)?)[\\s=:\"']+([^\\s\"'\\n]{6,})"
