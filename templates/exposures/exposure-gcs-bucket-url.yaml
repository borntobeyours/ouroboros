name: Google Cloud Storage Bucket URL Exposure
description: Detects exposed Google Cloud Storage bucket URLs in HTTP responses. Disclosed GCS bucket names can enable unauthorized enumeration and access if ACLs are misconfigured.
severity: low
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /
  - method: GET
    path: /api
  - method: GET
    path: /js/app.js

matchers:
  - regex: "https?://storage\\.googleapis\\.com/([a-z0-9\\-_\\.]+)"
  - regex: "gs://([a-z0-9\\-_\\.]+)"

extractors:
  - name: gcs_bucket
    regex: "(?:storage\\.googleapis\\.com/|gs://)([a-z0-9\\-_\\.]+)"
