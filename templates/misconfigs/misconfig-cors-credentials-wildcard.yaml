name: CORS Credentials Allowed with Reflected Origin
description: The server sets Access-Control-Allow-Credentials to true and reflects the attacker-supplied Origin header, creating a critical CORS misconfiguration that allows credentialed cross-origin requests from any origin.
severity: high
cwe: CWE-942

requests:
  - method: GET
    path: /api/user
    headers:
      Origin: https://evil.com

matchers:
  - header_contains: "Access-Control-Allow-Credentials: true"
  - header_contains: "Access-Control-Allow-Origin: https://evil.com"
  - status_code: 200
