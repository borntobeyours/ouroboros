name: Weebly Subdomain Takeover
description: Detects a dangling CNAME pointing to a Weebly-hosted site that has been deleted or the custom domain mapping removed. An attacker can create a Weebly site and claim the victim's domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "Not Found"
  - body_contains: "We could not find the page you were looking for"
  - status_code: 404
