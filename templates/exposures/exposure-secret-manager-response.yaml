name: Cloud Secret Manager Contents Exposed
description: Detects responses from cloud secret manager APIs containing secret values. Applications that proxy or log secret manager responses may expose sensitive secrets.
severity: critical
cwe: CWE-200

requests:
  - method: GET
    path: /api/secrets
  - method: GET
    path: /secrets
  - method: GET
    path: /api/config/secrets

matchers:
  - body_contains: "SecretString"
  - body_contains: "SecretBinary"
  - regex: "(?i)\"(?:secretValue|secretString)\"\\s*:\\s*\"[^\"]{8,}\""
  - body_contains: "ARN"

extractors:
  - name: secret_value
    regex: "(?i)\"(?:secretValue|SecretString)\"\\s*:\\s*\"([^\"]{8,})\""
