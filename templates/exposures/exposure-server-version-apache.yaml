name: Apache Version Disclosure
description: Detects Apache web server version numbers in HTTP response headers. Disclosed versions allow targeted exploitation of known CVEs for that specific Apache version.
severity: info
tags:
  - apache
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /

matchers:
  - regex: "Apache/[0-9]+\\.[0-9]+"
  - header_contains: "Apache/"

extractors:
  - name: apache_version
    regex: "Apache/([0-9]+\\.[0-9]+\\.?[0-9]*)"
