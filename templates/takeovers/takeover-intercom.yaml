name: Intercom Help Center Subdomain Takeover
description: Detects a dangling CNAME pointing to an Intercom Help Center that has been deleted or the custom domain removed. An attacker can create an Intercom workspace and associate the victim's custom domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "This page is reserved for artistic&nbsp;dogs"
  - body_contains: "intercom.io"
  - status_code: 404
