name: .htpasswd File Exposed
description: The .htpasswd file containing hashed credentials for HTTP Basic Authentication is publicly accessible. Attackers can download and attempt to crack the password hashes offline.
severity: high
tags:
  - generic
cwe: CWE-538

requests:
  - method: GET
    path: /.htpasswd

matchers:
  - status_code: 200
  - regex: "[a-zA-Z0-9_-]+:\\$apr1\\$"
  - regex: "[a-zA-Z0-9_-]+:\\{SHA\\}"

extractors:
  - name: usernames
    regex: "^([a-zA-Z0-9_.-]+):"
