name: Drupal User Enumeration
description: Detects Drupal user enumeration via the /user/N path. Drupal returns different responses for valid and invalid user IDs, allowing attackers to enumerate registered users and harvest usernames.
severity: medium
tags:
  - drupal
  - php
cwe: CWE-200

requests:
  - method: GET
    path: /user/1

matchers:
  - body_contains: "Drupal"
  - body_contains: "Member for"
  - regex: "user/[0-9]+/edit"
  - status_code: 200
