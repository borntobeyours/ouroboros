name: Prometheus Metrics with Sensitive Labels
description: Detects exposed Prometheus metrics endpoints containing sensitive label values such as hostnames, IPs, usernames, or service credentials in metric labels.
severity: medium
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /metrics
  - method: GET
    path: /actuator/prometheus
  - method: GET
    path: /_metrics

matchers:
  - body_contains: "# HELP"
  - body_contains: "# TYPE"
  - regex: "[a-zA-Z_][a-zA-Z0-9_]*\\{[^}]+\\} [0-9]"

extractors:
  - name: metric_labels
    regex: "([a-zA-Z_][a-zA-Z0-9_]*)\\{([^}]+)\\}"
