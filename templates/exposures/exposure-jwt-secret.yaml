name: JWT Secret Key Hardcoded
description: Detects hardcoded JWT secret keys in HTTP responses. Exposed JWT secrets allow attackers to forge valid tokens and impersonate any user, including administrators.
severity: critical
cwe: CWE-321

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config
  - method: GET
    path: /js/app.js

matchers:
  - regex: "(?i)jwt.{0,10}secret[\\s=:\"']+[0-9a-zA-Z!@#$%^&*\\-_]{16,}"
  - regex: "(?i)JWT_SECRET[\\s=:\"']+[0-9a-zA-Z!@#$%^&*\\-_]{16,}"

extractors:
  - name: jwt_secret
    regex: "(?i)(?:jwt_secret|jwt.secret)[\\s=:\"']+([0-9a-zA-Z!@#$%^&*\\-_]{16,})"
