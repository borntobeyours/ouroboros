name: Passwords in JavaScript
description: Detects hardcoded passwords in JavaScript files. JavaScript is served to all users; any credentials embedded in JS are exposed to anyone who views the source.
severity: high
tags:
  - generic
cwe: CWE-259

requests:
  - method: GET
    path: /js/app.js
  - method: GET
    path: /static/js/main.js
  - method: GET
    path: /assets/app.js

matchers:
  - regex: "(?i)(?:var|let|const)\\s+(?:password|passwd|pwd|secret)\\s*=\\s*['\"][^'\"]{6,}['\"]"
  - regex: "(?i)password:\\s*['\"][^'\"]{6,}['\"]"

extractors:
  - name: js_password
    regex: "(?i)(?:password|passwd|pwd)\\s*[=:]\\s*['\"]([^'\"]{6,})['\"]"
