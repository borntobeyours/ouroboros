name: Redis No Authentication Required
description: Detects Redis instances accessible without authentication. An unauthenticated Redis server allows arbitrary data read/write and may enable server-side request forgery or config rewrite attacks leading to RCE.
severity: critical
tags:
  - redis
cwe: CWE-1392

requests:
  - method: GET
    path: /
  - method: POST
    path: /api/redis/info
    headers:
      Content-Type: application/json
    body: '{"host":"localhost","port":6379}'

matchers:
  - body_contains: "redis_version"
  - body_contains: "connected_clients"
  - body_contains: "redis_mode"
