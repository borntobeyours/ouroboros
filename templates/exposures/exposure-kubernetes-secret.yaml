name: Kubernetes Secret Exposure
description: Detects exposed Kubernetes secret data in HTTP responses. Kubernetes secrets may contain service account tokens, TLS certificates, and application passwords.
severity: critical
cwe: CWE-200

requests:
  - method: GET
    path: /api/v1/namespaces/default/secrets
  - method: GET
    path: /api/v1/secrets

matchers:
  - body_contains: "\"kind\": \"Secret\""
  - body_contains: "\"kind\":\"SecretList\""
  - body_contains: "\"data\":"

extractors:
  - name: secret_name
    regex: "\"name\":\\s*\"([^\"]+)\""
