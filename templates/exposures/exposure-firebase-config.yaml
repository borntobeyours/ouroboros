name: Firebase Configuration Exposure
description: Detects exposed Firebase configuration objects in HTTP responses. Leaked Firebase configs may expose API keys and project identifiers that allow unauthorized database or storage access.
severity: medium
cwe: CWE-200

requests:
  - method: GET
    path: /
  - method: GET
    path: /js/app.js
  - method: GET
    path: /static/js/main.js
  - method: GET
    path: /firebase-config.js

matchers:
  - body_contains: "firebaseConfig"
  - regex: "apiKey:\\s*[\"'][A-Za-z0-9\\-_]{35,45}[\"']"

extractors:
  - name: firebase_api_key
    regex: "apiKey:\\s*[\"']([A-Za-z0-9\\-_]{35,45})[\"']"
  - name: firebase_project_id
    regex: "projectId:\\s*[\"']([a-z0-9\\-]+)[\"']"
