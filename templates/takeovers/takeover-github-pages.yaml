name: GitHub Pages Subdomain Takeover
description: Detects a dangling CNAME pointing to GitHub Pages where the repository or user account no longer has a Pages site configured. An attacker can create a GitHub repository matching the subdomain and serve arbitrary content.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "There isn't a GitHub Pages site here."
  - body_contains: "For root URLs (like http://example.com/) you must provide an index.html"
  - status_code: 404
