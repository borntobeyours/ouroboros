name: Passwords in HTML Comments
description: Detects passwords or credentials embedded in HTML comments. Developers sometimes leave credentials in comments during testing; these are visible in page source.
severity: high
tags:
  - generic
cwe: CWE-615

requests:
  - method: GET
    path: /
  - method: GET
    path: /login
  - method: GET
    path: /admin

matchers:
  - regex: "<!--[^>]*(?:password|passwd|pwd|secret)[^>]*=[^>]*-->"
  - regex: "<!--[^>]*(?:username|user):[^>]*:[^>]*-->"

extractors:
  - name: commented_credentials
    regex: "<!--([^>]*(?:password|passwd|pwd)[^>]*)-->"
