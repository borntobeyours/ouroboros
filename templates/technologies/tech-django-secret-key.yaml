name: Django SECRET_KEY Exposed
description: Detects exposure of the Django SECRET_KEY in debug pages, environment files, or configuration endpoints. Knowing the SECRET_KEY allows attackers to forge session cookies, CSRF tokens, and signed URL parameters.
severity: critical
tags:
  - django
  - python
cwe: CWE-321

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config.py

matchers:
  - body_contains: "SECRET_KEY"
  - regex: "SECRET_KEY\\s*=\\s*['\"][^'\"]{20,}"
  - status_code: 200
