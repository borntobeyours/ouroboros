name: IIS web.config File Exposed
description: Detects a publicly readable IIS web.config file. This configuration file may contain connection strings with database credentials, machine keys used for session and viewstate signing, API keys, and other application secrets.
severity: critical
cwe: CWE-312

requests:
  - method: GET
    path: /web.config

matchers:
  - body_contains: "connectionStrings"
  - body_contains: "machineKey"
  - body_contains: "<configuration>"
  - status_code: 200
