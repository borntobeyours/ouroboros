name: Dropbox Access Token Exposure
description: Detects exposed Dropbox access tokens in HTTP responses. Leaked tokens allow full read/write access to the user's Dropbox files and folders.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "sl\\.[0-9a-zA-Z\\-_]{130,}"
  - regex: "(?i)dropbox.{0,20}token[\\s=:\"']+[0-9a-zA-Z\\-_]{60,}"

extractors:
  - name: dropbox_token
    regex: "(sl\\.[0-9a-zA-Z\\-_]{130,})"
