name: Azure Client Secret Exposure
description: Detects exposed Azure Active Directory client secrets in HTTP responses. Leaked Azure client secrets allow unauthorized access to Azure resources and services.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config
  - method: GET
    path: /appsettings.json

matchers:
  - regex: "(?i)azure.{0,20}client.secret[\\s=:\"']+[0-9a-zA-Z~_\\-\\.]{34,40}"
  - regex: "(?i)AZURE_CLIENT_SECRET[\\s=:\"']+[0-9a-zA-Z~_\\-\\.]{34,40}"

extractors:
  - name: azure_client_secret
    regex: "(?i)(?:azure_client_secret|client.secret)[\\s=:\"']+([0-9a-zA-Z~_\\-\\.]{34,40})"
