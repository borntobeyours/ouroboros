name: GitHub Actions Secrets Exposure in Logs
description: GitHub Actions workflow logs may expose environment secrets printed via echo or debug output. Leaked secrets in logs include API keys, tokens, and credentials that can be harvested.
severity: high
tags:
  - generic
cwe: CWE-532

requests:
  - method: GET
    path: /.github/workflows/
  - method: GET
    path: /.github/workflows/main.yml

matchers:
  - body_contains: "${{ secrets."
  - body_contains: "GITHUB_TOKEN"
  - body_contains: "run: echo $"
  - status_code: 200
