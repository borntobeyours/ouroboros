name: Docker Hub Access Token Exposure
description: Detects exposed Docker Hub access tokens in HTTP responses. Leaked tokens allow pushing malicious images or pulling private images from Docker Hub repositories.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config
  - method: GET
    path: /.docker/config.json

matchers:
  - regex: "dckr_pat_[0-9a-zA-Z\\-_]{27}"
  - regex: "(?i)docker.{0,20}token[\\s=:\"']+[0-9a-zA-Z\\-_]{27,}"

extractors:
  - name: docker_token
    regex: "(dckr_pat_[0-9a-zA-Z\\-_]{27})"
