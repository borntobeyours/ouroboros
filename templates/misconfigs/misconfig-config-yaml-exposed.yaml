name: config.yaml Application Configuration Exposed
description: An application configuration file (config.yaml or config.yml) is publicly accessible, potentially containing database credentials, API keys, service endpoints, and other sensitive configuration data.
severity: high
tags:
  - generic
cwe: CWE-538

requests:
  - method: GET
    path: /config.yaml
  - method: GET
    path: /config.yml
  - method: GET
    path: /app/config.yaml

matchers:
  - status_code: 200
  - body_contains: "password:"
  - body_contains: "secret:"
  - regex: "(password|secret|key|token):\\s+[^\\n]+"

extractors:
  - name: db_password
    regex: "password:\\s+([^\\n]+)"
