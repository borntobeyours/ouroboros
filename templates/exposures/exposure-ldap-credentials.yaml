name: LDAP Credentials Exposure
description: Detects exposed LDAP credentials in HTTP responses. Leaked LDAP bind DN and password allow unauthorized directory service queries and potentially privilege escalation.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "(?i)ldap(?:s)?://[^:]+:[^@]+@[a-zA-Z0-9.\\-]+"
  - regex: "(?i)LDAP_BIND_(?:DN|PASSWORD)[\\s=:\"']+\\S+"
  - regex: "(?i)ldap.{0,20}password[\\s=:\"']+\\S+"

extractors:
  - name: ldap_url
    regex: "(ldaps?://[^:]+:[^@]+@[^\\s\"'<>]+)"
