name: WordPress readme.html Version Disclosure
description: The WordPress readme.html file is publicly accessible and discloses the exact WordPress version number. Attackers can use this to identify and target known vulnerabilities for that specific version.
severity: info
cwe: CWE-200

requests:
  - method: GET
    path: /readme.html

matchers:
  - body_contains: "WordPress"
  - body_contains: "Version"
  - regex: "Version [0-9]+\\.[0-9]+"
  - status_code: 200
