name: macOS .DS_Store File Exposed
description: The .DS_Store file generated by macOS Finder is publicly accessible. It contains directory structure metadata that attackers can parse to enumerate files and folders not otherwise linked.
severity: low
cwe: CWE-538

requests:
  - method: GET
    path: /.DS_Store

matchers:
  - status_code: 200
  - regex: "\\x00\\x00\\x00\\x01Bud1"
  - header_contains: "application/octet-stream"
