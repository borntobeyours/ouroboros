name: Rails Development Mode Exposed
description: Ruby on Rails application is running in development mode, which exposes detailed exception pages with stack traces and local variable values.
severity: high
tags:
  - generic
  - rails
  - ruby
cwe: CWE-489

requests:
  - method: GET
    path: /nonexistent-path-to-trigger-error

matchers:
  - body_contains: "RuntimeError"
  - body_contains: "Rails.root"
  - body_contains: "Application Trace"
  - regex: "config\\.log_level\\s*=\\s*:debug"
