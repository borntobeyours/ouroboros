name: Heroku Subdomain Takeover
description: Detects a dangling CNAME pointing to a Heroku application that has been deleted. An attacker can create a new Heroku app with the same name and serve malicious content under the victim's domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "No such app"
  - body_contains: "herokucdn.com/error-pages/no-such-app.html"
  - status_code: 404
