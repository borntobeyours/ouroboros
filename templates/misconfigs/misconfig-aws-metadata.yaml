name: AWS EC2 Instance Metadata Service Accessible
description: The AWS EC2 Instance Metadata Service (IMDS) endpoint is reachable, indicating a potential SSRF vulnerability. An attacker can retrieve IAM role credentials, user-data scripts, and instance configuration.
severity: critical
cwe: CWE-918

requests:
  - method: GET
    path: /latest/meta-data/
    headers:
      Host: 169.254.169.254
  - method: GET
    path: /latest/meta-data/iam/security-credentials/

matchers:
  - body_contains: "ami-id"
  - body_contains: "instance-id"
  - status_code: 200

extractors:
  - name: iam_role
    regex: "iam/security-credentials/([^\\n]+)"
