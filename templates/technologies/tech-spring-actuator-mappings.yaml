name: Spring Boot Actuator /mappings Endpoint Exposed
description: Detects an unauthenticated Spring Boot Actuator /mappings endpoint. This endpoint enumerates all HTTP request mappings including controller methods, path patterns, and filter chains, exposing the application's full URL surface.
severity: medium
cwe: CWE-200

requests:
  - method: GET
    path: /actuator/mappings
  - method: GET
    path: /mappings

matchers:
  - body_contains: "dispatcherServlets"
  - body_contains: "mappings"
  - body_contains: "handler"
  - status_code: 200
