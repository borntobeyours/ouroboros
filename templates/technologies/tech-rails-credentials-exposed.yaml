name: Rails credentials.yml.enc Exposed
description: Detects a publicly accessible Rails credentials.yml.enc file. While encrypted, its exposure combined with a leaked RAILS_MASTER_KEY allows decryption of all stored secrets including API keys, database passwords, and service credentials.
severity: high
cwe: CWE-312

requests:
  - method: GET
    path: /config/credentials.yml.enc
  - method: GET
    path: /config/master.key

matchers:
  - body_contains: "RAILS_MASTER_KEY"
  - status_code: 200
