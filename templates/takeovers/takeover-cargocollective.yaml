name: Cargo Collective Subdomain Takeover
description: Detects a dangling CNAME pointing to a Cargo Collective portfolio site that has been deleted. An attacker can register a new Cargo Collective portfolio and assign the victim's domain to it.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "404 Not Found"
  - body_contains: "cargocollective.com"
  - status_code: 404
