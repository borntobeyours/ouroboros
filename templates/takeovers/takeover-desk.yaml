name: Desk.com Support Subdomain Takeover
description: Detects a dangling CNAME pointing to a Desk.com (Salesforce) customer support portal that has been removed. An attacker can claim the Desk.com subdomain associated with the victim's domain.
severity: high
tags:
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "Sorry, We Couldn't Find That Page"
  - body_contains: "desk.com"
  - status_code: 404
