name: Campaign Monitor Subdomain Takeover
description: Detects a dangling CNAME pointing to a Campaign Monitor domain where the account or campaign has been deleted. An attacker can set up a Campaign Monitor account pointing to the victim's domain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "Double-check the URL or"
  - body_contains: "Trying to access your account?"
  - status_code: 404
