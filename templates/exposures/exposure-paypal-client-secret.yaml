name: PayPal Client Secret Exposure
description: Detects exposed PayPal client secrets in HTTP responses. Leaked PayPal client secrets allow attackers to make API calls on behalf of the merchant account, potentially processing or voiding transactions.
severity: critical
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "(?i)paypal.{0,20}secret[\\s=:\"']+[0-9a-zA-Z\\-_]{20,50}"
  - regex: "(?i)PAYPAL_CLIENT_SECRET[\\s=:\"']+[0-9a-zA-Z\\-_]{20,50}"

extractors:
  - name: paypal_secret
    regex: "(?i)(?:paypal_client_secret|paypal.secret)[\\s=:\"']+([0-9a-zA-Z\\-_]{20,50})"
