name: Heroku Procfile Exposed
description: Detects a publicly accessible Heroku Procfile. This file defines the commands run by each process type and may reveal application startup commands, environment variable names, worker scripts, and internal service architecture.
severity: low
cwe: CWE-200

requests:
  - method: GET
    path: /Procfile

matchers:
  - body_contains: "web:"
  - body_contains: "worker:"
  - regex: "^(web|worker|clock|release):"
  - status_code: 200
