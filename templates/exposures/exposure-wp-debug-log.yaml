name: WordPress Debug Log Exposed
description: Detects exposed WordPress debug.log files containing PHP errors, warnings, and potentially sensitive debug information including file paths and database queries.
severity: medium
cwe: CWE-200

requests:
  - method: GET
    path: /wp-content/debug.log
  - method: GET
    path: /debug.log

matchers:
  - body_contains: "PHP Warning"
  - body_contains: "PHP Notice"
  - body_contains: "PHP Fatal error"
  - regex: "\\[\\d{2}-[A-Za-z]+-\\d{4}"

extractors:
  - name: php_errors
    regex: "(PHP (?:Warning|Notice|Fatal error)[^\\n]{0,200})"
