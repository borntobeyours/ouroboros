name: US Social Security Number Exposure
description: Detects US Social Security Numbers in HTTP responses. Exposed SSNs constitute a serious PII breach that may violate HIPAA, state privacy laws, and other regulations.
severity: high
cwe: CWE-312

requests:
  - method: GET
    path: /api/users
  - method: GET
    path: /api/profile
  - method: GET
    path: /api/employees
  - method: GET
    path: /api/customers

matchers:
  - regex: "\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b"

extractors:
  - name: ssn
    regex: "(\\b(?!000|666|9\\d{2})\\d{3}-(?!00)\\d{2}-(?!0000)\\d{4}\\b)"
