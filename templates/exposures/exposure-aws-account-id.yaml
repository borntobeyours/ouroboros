name: AWS Account ID Disclosure
description: Detects exposed AWS account IDs in HTTP responses. Knowing the 12-digit AWS account ID enables cross-account enumeration and targeted IAM attacks.
severity: low
cwe: CWE-200

requests:
  - method: GET
    path: /
  - method: GET
    path: /api/config
  - method: GET
    path: /health
  - method: GET
    path: /status

matchers:
  - regex: "(?i)(?:account.id|account_id)[\"'\\s]*:[\"'\\s]*[\"']?[0-9]{12}[\"']?"
  - regex: "arn:aws:[a-z0-9\\-]+:[a-z0-9\\-]*:([0-9]{12}):"

extractors:
  - name: aws_account_id
    regex: "([0-9]{12})"
