name: Jupyter Notebook No Token Authentication
description: Detects Jupyter Notebook instances accessible without a token or password. Unauthenticated Jupyter allows arbitrary Python/system command execution in the context of the server process.
severity: critical
cwe: CWE-1392

requests:
  - method: GET
    path: /api/kernels
  - method: GET
    path: /tree
  - method: GET
    path: /api/contents

matchers:
  - body_contains: "kernels"
  - body_contains: "Jupyter"
  - body_contains: "notebook_path"
  - status_code: 200
