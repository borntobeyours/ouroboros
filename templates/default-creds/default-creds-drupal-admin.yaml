name: Drupal Default Admin Credentials
description: Attempts to authenticate to Drupal CMS administrative interface using default admin/admin credentials. Successful login allows PHP code execution via custom modules or theme file uploads.
severity: critical
cwe: CWE-1392

requests:
  - method: POST
    path: /user/login
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "name=admin&pass=admin&form_id=user_login_form&op=Log+in"
  - method: POST
    path: /?q=user/login
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "name=admin&pass=admin&form_id=user_login_form&op=Log+in"

matchers:
  - body_contains: "Drupal"
  - body_contains: "Edit account"
  - body_contains: "Admin"
  - header_contains: "SESS"
