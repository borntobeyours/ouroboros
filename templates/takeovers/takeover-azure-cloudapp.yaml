name: Azure CloudApp Subdomain Takeover
description: Detects a dangling CNAME pointing to an Azure cloudapp.net deployment that has been removed. An attacker can register the cloudapp.net hostname and serve content from the victim's subdomain.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "404 - File or directory not found"
  - body_contains: "This page cannot be displayed"
  - status_code: 404
