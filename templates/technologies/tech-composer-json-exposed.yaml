name: PHP composer.json Exposed
description: Detects a publicly accessible PHP Composer composer.json file. This file reveals PHP package dependencies with version constraints, enabling targeted attacks against known-vulnerable library versions in use by the application.
severity: low
cwe: CWE-200

requests:
  - method: GET
    path: /composer.json

matchers:
  - body_contains: "\"require\":"
  - body_contains: "\"name\":"
  - body_contains: "composer"
  - status_code: 200
