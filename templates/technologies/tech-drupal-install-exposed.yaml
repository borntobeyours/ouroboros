name: Drupal install.php Exposed
description: Detects an accessible Drupal install.php file. If accessible post-installation, this file can be used to reinstall Drupal over the existing site, potentially wiping data or creating a rogue admin account.
severity: high
cwe: CWE-425

requests:
  - method: GET
    path: /install.php

matchers:
  - body_contains: "Drupal"
  - body_contains: "Choose language"
  - body_contains: "installation"
  - status_code: 200
