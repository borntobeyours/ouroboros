name: GitHub Personal Access Token Exposure
description: Detects exposed GitHub personal access tokens in HTTP responses. Leaked tokens can allow repository access, code exfiltration, and modification of GitHub resources.
severity: critical
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "ghp_[0-9a-zA-Z]{36}"
  - regex: "github_pat_[0-9a-zA-Z_]{82}"
  - regex: "(?i)github.{0,20}token[\\s=:\"']+[0-9a-f]{40}"

extractors:
  - name: github_token
    regex: "(ghp_[0-9a-zA-Z]{36}|github_pat_[0-9a-zA-Z_]{82})"
