name: robots.txt Reveals Sensitive Paths
description: The robots.txt file discloses sensitive or administrative paths that the site owner tried to hide from search engines. These Disallow entries often reveal admin panels, backup directories, API endpoints, and other high-value targets.
severity: info
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /robots.txt

matchers:
  - body_contains: "Disallow:"
  - status_code: 200
  - regex: "Disallow:\\s+/(admin|api|backup|config|private|secret|internal)"

extractors:
  - name: disallowed_paths
    regex: "Disallow:\\s+([^\\n]+)"
