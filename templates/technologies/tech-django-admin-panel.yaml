name: Django Admin Panel Exposed
description: Detects the presence of the Django admin interface at /admin/. The admin panel provides full management access to the Django application and its database if credentials are compromised or defaults are used.
severity: medium
cwe: CWE-200

requests:
  - method: GET
    path: /admin/

matchers:
  - body_contains: "Django administration"
  - body_contains: "django"
  - body_contains: "csrfmiddlewaretoken"
  - status_code: 200
