name: Honeywell Building Controller Default Credentials
description: Attempts to authenticate to Honeywell building automation controllers and CCTV systems using default admin/1234 credentials. Successful access can affect physical security and building infrastructure controls.
severity: high
cwe: CWE-1392

requests:
  - method: POST
    path: /login
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username=admin&password=1234"
  - method: GET
    path: /
    headers:
      Authorization: "Basic YWRtaW46MTIzNA=="

matchers:
  - body_contains: "Honeywell"
  - body_contains: "HONEYWELL"
  - body_contains: "Building"
  - status_code: 200
