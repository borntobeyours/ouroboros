name: Unbounce Subdomain Takeover
description: Detects a dangling CNAME pointing to an Unbounce landing page platform where the page or domain mapping has been deleted. An attacker can link their Unbounce account to the victim's domain.
severity: high
tags:
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "The requested URL was not found on this server."
  - body_contains: "page not found"
  - status_code: 404
