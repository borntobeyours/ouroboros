name: Rails secrets.yml Exposed
description: Detects exposed Rails secrets.yml files containing the secret_key_base and other application secrets used for session encryption.
severity: critical
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /config/secrets.yml
  - method: GET
    path: /secrets.yml

matchers:
  - body_contains: "secret_key_base:"
  - body_contains: "production:"

extractors:
  - name: secret_key_base
    regex: "secret_key_base:\\s*([a-f0-9]{128})"
