name: MikroTik RouterOS Default Credentials
description: Attempts to authenticate to MikroTik RouterOS web interface (Webfig) using default admin account with empty password. Access enables full router configuration modification.
severity: critical
cwe: CWE-1392

requests:
  - method: POST
    path: /jsproxy
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "username=admin&password="
  - method: GET
    path: /webfig/
    headers:
      Authorization: "Basic YWRtaW46"

matchers:
  - body_contains: "MikroTik"
  - body_contains: "RouterOS"
  - body_contains: "Webfig"
  - status_code: 200
