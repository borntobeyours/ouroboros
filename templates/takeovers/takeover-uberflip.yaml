name: Uberflip Subdomain Takeover
description: Detects a dangling CNAME pointing to an Uberflip hub that has been deleted or the custom domain removed. An attacker can create a new Uberflip hub and claim the unconfigured domain.
severity: high
tags:
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "Non-hub"
  - body_contains: "The URL you've accessed does not provide a hub"
  - status_code: 404
