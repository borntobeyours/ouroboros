name: Spring Boot Actuator /env Endpoint Exposed
description: The Spring Boot Actuator /env endpoint is publicly accessible, exposing all application environment properties including database passwords, API keys, and cloud credentials, even if some values are partially masked.
severity: critical
tags:
  - java
  - spring
cwe: CWE-200

requests:
  - method: GET
    path: /actuator/env
    headers:
      Accept: application/json
  - method: GET
    path: /env

matchers:
  - body_contains: "propertySources"
  - body_contains: "applicationConfig"
  - status_code: 200

extractors:
  - name: db_password
    regex: "\"spring.datasource.password\":\\{\"value\":\"([^\"]+)\""
