name: X-Powered-By Header Disclosure
description: Detects technology information in the X-Powered-By response header. This header reveals the application framework and version, enabling targeted vulnerability exploitation.
severity: info
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /

matchers:
  - header_contains: "X-Powered-By"

extractors:
  - name: powered_by
    regex: "X-Powered-By: (.+)"
