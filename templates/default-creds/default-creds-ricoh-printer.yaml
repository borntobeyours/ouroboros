name: Ricoh Printer Default Credentials
description: Attempts to authenticate to Ricoh printer web management interface using default admin account with empty password. Access exposes printer settings, address books, and stored documents.
severity: medium
cwe: CWE-1392

requests:
  - method: POST
    path: /web/login.html
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "userid=admin&password=&login=Login"
  - method: GET
    path: /
    headers:
      Authorization: "Basic YWRtaW46"

matchers:
  - body_contains: "Ricoh"
  - body_contains: "Web Image Monitor"
  - body_contains: "RICOH"
  - status_code: 200
