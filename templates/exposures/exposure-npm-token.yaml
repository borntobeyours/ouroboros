name: NPM Auth Token Exposure
description: Detects exposed NPM authentication tokens in HTTP responses. Leaked NPM tokens allow attackers to publish malicious packages or access private package registries.
severity: high
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /.npmrc
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "npm_[0-9a-zA-Z]{36}"
  - regex: "(?i)npm.{0,10}token[\\s=:\"']+[0-9a-f\\-]{36,}"

extractors:
  - name: npm_token
    regex: "(npm_[0-9a-zA-Z]{36})"
