name: Ghost Blog Subdomain Takeover
description: Detects a dangling CNAME pointing to a Ghost(Pro) hosted blog that has been deleted or the custom domain removed. An attacker can register a Ghost publication and claim the victim's subdomain.
severity: high
tags:
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "404 Not Found"
  - body_contains: "ghost.io"
  - status_code: 404
