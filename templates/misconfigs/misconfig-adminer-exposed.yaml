name: Adminer Database Manager Exposed
description: Adminer (formerly phpMinAdmin) database management tool is publicly accessible, supporting MySQL, PostgreSQL, SQLite, and more. Exposure can lead to database enumeration and data exfiltration.
severity: high
tags:
  - generic
cwe: CWE-306

requests:
  - method: GET
    path: /adminer.php
  - method: GET
    path: /adminer/
  - method: GET
    path: /database.php

matchers:
  - body_contains: "Adminer"
  - body_contains: "adminer"
  - status_code: 200
