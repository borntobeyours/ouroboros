name: GitLab Personal Access Token Exposure
description: Detects exposed GitLab personal access tokens in HTTP responses. Leaked tokens provide unauthorized access to GitLab repositories, CI/CD pipelines, and project settings.
severity: critical
tags:
  - gitlab
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config

matchers:
  - regex: "glpat-[0-9a-zA-Z\\-_]{20}"
  - regex: "(?i)gitlab.{0,20}token[\\s=:\"']+[0-9a-zA-Z\\-_]{20,}"

extractors:
  - name: gitlab_token
    regex: "(glpat-[0-9a-zA-Z\\-_]{20})"
