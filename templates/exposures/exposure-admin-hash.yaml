name: Password Hash Exposure
description: Detects password hashes in HTTP responses. Exposed hashes can be subjected to offline cracking attacks to recover plaintext passwords.
severity: high
tags:
  - generic
cwe: CWE-312

requests:
  - method: GET
    path: /api/users
  - method: GET
    path: /api/admin/users
  - method: GET
    path: /admin/users

matchers:
  - regex: "\\$2[aby]\\$[0-9]{2}\\$[./a-zA-Z0-9]{53}"
  - regex: "\\$1\\$[a-zA-Z0-9./]{8}\\$[a-zA-Z0-9./]{22}"
  - regex: "\\$6\\$[a-zA-Z0-9./]{8,16}\\$[a-zA-Z0-9./]{86}"
  - regex: "[0-9a-f]{32}|[0-9a-f]{40}|[0-9a-f]{64}"

extractors:
  - name: bcrypt_hash
    regex: "(\\$2[aby]\\$[0-9]{2}\\$[./a-zA-Z0-9]{53})"
