name: MongoDB Exposed Without Authentication
description: MongoDB instance is accessible over HTTP or native protocol without authentication. Attackers can enumerate databases, read all collections, and perform destructive write or delete operations.
severity: critical
cwe: CWE-306

requests:
  - method: GET
    path: /
  - method: GET
    path: /db/admin/

matchers:
  - body_contains: "MongoDB"
  - body_contains: "\"ok\" : 1"
  - regex: "mongodb"
