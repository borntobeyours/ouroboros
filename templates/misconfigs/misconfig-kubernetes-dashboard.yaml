name: Kubernetes Dashboard Exposed
description: The Kubernetes Dashboard web UI is publicly accessible without authentication. An attacker can enumerate cluster resources, execute commands in containers, and escalate to cluster-admin privileges.
severity: critical
cwe: CWE-306

requests:
  - method: GET
    path: /
  - method: GET
    path: /#/login

matchers:
  - body_contains: "Kubernetes Dashboard"
  - body_contains: "kubernetes"
  - status_code: 200
