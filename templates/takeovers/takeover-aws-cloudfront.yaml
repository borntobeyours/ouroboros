name: AWS CloudFront Subdomain Takeover
description: Detects a dangling CNAME pointing to an unclaimed AWS CloudFront distribution. The distribution has been deleted but the DNS record still points to CloudFront, allowing an attacker to claim the distribution.
severity: high
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "Bad request."
  - body_contains: "ERROR: The request could not be satisfied"
  - status_code: 400
