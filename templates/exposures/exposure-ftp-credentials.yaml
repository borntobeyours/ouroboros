name: FTP Credentials Exposure
description: Detects exposed FTP credentials in HTTP responses. Leaked FTP usernames and passwords allow unauthorized file transfer access to the server.
severity: high
tags:
  - generic
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config
  - method: GET
    path: /ftp.config

matchers:
  - regex: "ftp:\\/\\/[^:]+:[^@]+@[a-zA-Z0-9.\\-]+"
  - regex: "(?i)ftp.{0,10}password[\\s=:\"']+\\S+"

extractors:
  - name: ftp_url
    regex: "(ftp:\\/\\/[^:]+:[^@]+@[^\\s\"'<>]+)"
