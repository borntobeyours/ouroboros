name: GitBook Documentation Subdomain Takeover
description: Detects a dangling CNAME pointing to a GitBook documentation site that has been deleted or the custom domain removed. An attacker can create a GitBook space and associate the victim's domain.
severity: high
tags:
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "If you need to login to Gitbook, click here"
  - body_contains: "gitbook.io"
  - status_code: 404
