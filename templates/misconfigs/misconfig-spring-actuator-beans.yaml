name: Spring Boot Actuator /beans Endpoint Exposed
description: The Spring Boot Actuator /beans endpoint is publicly accessible, exposing the complete list of Spring beans in the application context, revealing application architecture, class names, and component structure.
severity: medium
tags:
  - java
  - spring
cwe: CWE-200

requests:
  - method: GET
    path: /actuator/beans
    headers:
      Accept: application/json
  - method: GET
    path: /beans

matchers:
  - body_contains: "\"beans\":"
  - body_contains: "\"type\":"
  - status_code: 200
