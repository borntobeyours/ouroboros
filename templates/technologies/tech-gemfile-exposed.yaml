name: Ruby Gemfile Exposed
description: Detects a publicly accessible Ruby Gemfile or Gemfile.lock. These files disclose all Ruby gem dependencies and exact version numbers, allowing attackers to identify and target known-vulnerable gems in use.
severity: low
cwe: CWE-200

requests:
  - method: GET
    path: /Gemfile
  - method: GET
    path: /Gemfile.lock

matchers:
  - body_contains: "source"
  - body_contains: "gem "
  - body_contains: "ruby"
  - status_code: 200
