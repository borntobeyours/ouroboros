name: AWS Credentials File Exposure
description: Detects exposed AWS credentials files in HTTP responses. These files contain named profiles with access key IDs and secret access keys for AWS API access.
severity: critical
tags:
  - aws
  - cloud
cwe: CWE-200

requests:
  - method: GET
    path: /.aws/credentials
  - method: GET
    path: /aws/credentials

matchers:
  - body_contains: "[default]"
  - body_contains: "aws_access_key_id"
  - body_contains: "aws_secret_access_key"

extractors:
  - name: access_key
    regex: "aws_access_key_id\\s*=\\s*((?:AKIA|ASIA)[0-9A-Z]{16})"
  - name: secret_key
    regex: "aws_secret_access_key\\s*=\\s*([0-9a-zA-Z/+]{40})"
