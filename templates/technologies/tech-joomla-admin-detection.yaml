name: Joomla Admin Panel Detection
description: Detects the presence of the Joomla administrator login panel at /administrator. Exposed admin panels are targets for brute-force and credential stuffing attacks.
severity: info
tags:
  - joomla
  - php
cwe: CWE-200

requests:
  - method: GET
    path: /administrator/

matchers:
  - body_contains: "Joomla"
  - body_contains: "Administrator"
  - body_contains: "mod-login"
  - status_code: 200
