name: Backup ZIP Archives Exposed
description: ZIP archive files are accessible via the web server, potentially containing complete application source code, database dumps, configuration files with credentials, or other sensitive data.
severity: high
cwe: CWE-530

requests:
  - method: GET
    path: /backup.zip
  - method: GET
    path: /site.zip
  - method: GET
    path: /www.zip
  - method: GET
    path: /app.zip

matchers:
  - status_code: 200
  - header_contains: "application/zip"
  - regex: "PK\\x03\\x04"
