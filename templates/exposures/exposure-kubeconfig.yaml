name: Kubernetes Config File Exposure
description: Detects exposed kubeconfig files in HTTP responses. Kubeconfig files contain cluster API server URLs, client certificates, and tokens granting full cluster control.
severity: critical
cwe: CWE-200

requests:
  - method: GET
    path: /.kube/config
  - method: GET
    path: /kubeconfig
  - method: GET
    path: /kube.config

matchers:
  - body_contains: "apiVersion: v1"
  - body_contains: "kind: Config"
  - body_contains: "clusters:"
  - body_contains: "users:"

extractors:
  - name: cluster_server
    regex: "server:\\s*(https?://[^\\s]+)"
