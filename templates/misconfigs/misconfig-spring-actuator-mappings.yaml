name: Spring Boot Actuator /mappings Endpoint Exposed
description: The Spring Boot Actuator /mappings endpoint is publicly accessible, revealing all request handler mappings including all API routes, controller methods, and request patterns defined in the application.
severity: medium
cwe: CWE-200

requests:
  - method: GET
    path: /actuator/mappings
    headers:
      Accept: application/json
  - method: GET
    path: /mappings

matchers:
  - body_contains: "\"mappings\":"
  - body_contains: "\"dispatcherServlets\":"
  - status_code: 200
