name: MySQL Root Empty Password
description: Checks for MySQL root account accessible without a password. Many default MySQL installations ship with an unauthenticated root account, allowing full database compromise.
severity: critical
cwe: CWE-1392

requests:
  - method: POST
    path: /phpmyadmin/index.php
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "pma_username=root&pma_password=&server=1&target=index.php&token="
  - method: POST
    path: /pma/index.php
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "pma_username=root&pma_password=&server=1"

matchers:
  - body_contains: "phpMyAdmin"
  - body_contains: "pma_navigation"
  - body_contains: "Welcome to phpMyAdmin"
