name: AWS Secret Access Key Exposure
description: Detects exposed AWS Secret Access Keys in HTTP responses. These 40-character base64 keys paired with an access key ID grant full programmatic AWS access.
severity: critical
tags:
  - aws
  - cloud
cwe: CWE-200

requests:
  - method: GET
    path: /.env
  - method: GET
    path: /config
  - method: GET
    path: /api/config
  - method: GET
    path: /.aws/credentials

matchers:
  - regex: "(?i)aws.{0,20}secret.{0,20}['\"][0-9a-zA-Z/+]{40}['\"]"
  - regex: "(?i)secret_access_key[\\s=:\"']+[0-9a-zA-Z/+]{40}"

extractors:
  - name: aws_secret_key
    regex: "([0-9a-zA-Z/+]{40})"
