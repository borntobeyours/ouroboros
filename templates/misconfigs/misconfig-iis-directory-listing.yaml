name: IIS Directory Listing Enabled
description: Microsoft IIS has directory browsing enabled, exposing folder contents to unauthenticated users. This can reveal sensitive files, scripts, and configuration data.
severity: medium
tags:
  - generic
  - iis
  - microsoft
cwe: CWE-548

requests:
  - method: GET
    path: /
  - method: GET
    path: /uploads/

matchers:
  - body_contains: "Directory Listing"
  - body_contains: "[To Parent Directory]"
  - regex: "IIS [0-9\\.]+"
