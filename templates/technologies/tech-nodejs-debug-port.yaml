name: Node.js Debug Port (9229) Exposed
description: Detects a publicly exposed Node.js debugging port (9229/9230). When the --inspect or --inspect-brk flag is used and the debug port is accessible, attackers can connect a Chrome DevTools debugger and execute arbitrary code.
severity: critical
cwe: CWE-94

requests:
  - method: GET
    path: /json/version

matchers:
  - body_contains: "Browser"
  - body_contains: "webSocketDebuggerUrl"
  - body_contains: "V8-Version"
  - status_code: 200
