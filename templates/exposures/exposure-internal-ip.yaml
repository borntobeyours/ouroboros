name: Internal IP Address Disclosure
description: Detects internal/private IP addresses in HTTP responses. Disclosed internal IPs reveal network topology and can assist in lateral movement during an attack.
severity: low
cwe: CWE-200

requests:
  - method: GET
    path: /
  - method: GET
    path: /api
  - method: GET
    path: /health
  - method: GET
    path: /status

matchers:
  - regex: "(?:10\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)|172\\.(?:1[6-9]|2[0-9]|3[01])\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)|192\\.168\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))"

extractors:
  - name: internal_ip
    regex: "((?:10|172\\.(?:1[6-9]|2[0-9]|3[01])|192\\.168)\\.[0-9]{1,3}\\.[0-9]{1,3})"
