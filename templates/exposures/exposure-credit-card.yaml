name: Credit Card Number Exposure
description: Detects credit card numbers in HTTP responses. Exposed payment card data may violate PCI-DSS compliance requirements.
severity: high
tags:
  - generic
cwe: CWE-312

requests:
  - method: GET
    path: /api/payments
  - method: GET
    path: /api/orders
  - method: GET
    path: /api/transactions

matchers:
  - regex: "(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12})"

extractors:
  - name: card_number
    regex: "((?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}))"
