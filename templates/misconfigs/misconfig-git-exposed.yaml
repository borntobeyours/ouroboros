name: Git Repository Exposed
description: The .git directory is publicly accessible, allowing attackers to reconstruct the full source code, access commit history, and discover secrets like API keys and credentials stored in git history.
severity: high
tags:
  - generic
cwe: CWE-538

requests:
  - method: GET
    path: /.git/HEAD
  - method: GET
    path: /.git/config
  - method: GET
    path: /.git/COMMIT_EDITMSG

matchers:
  - body_contains: "ref: refs/"
  - body_contains: "[core]"
  - status_code: 200

extractors:
  - name: git_branch
    regex: "ref: refs/heads/([^\\n]+)"
