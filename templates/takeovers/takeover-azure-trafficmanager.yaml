name: Azure Traffic Manager Subdomain Takeover
description: Detects a dangling CNAME pointing to an Azure Traffic Manager profile that has been deleted. An attacker can register the Traffic Manager DNS name and redirect victim traffic to a malicious server.
severity: high
tags:
  - azure
  - cloud
  - generic
cwe: CWE-116

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "404 Not Found"
  - body_contains: "DNS name does not exist"
  - regex: "trafficmanager\\.net"
  - status_code: 404
