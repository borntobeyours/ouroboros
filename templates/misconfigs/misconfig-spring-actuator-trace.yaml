name: Spring Boot Actuator /httptrace Endpoint Exposed
description: The Spring Boot Actuator /httptrace (or /trace) endpoint is publicly accessible, exposing recent HTTP request/response history including authorization headers, cookies, session tokens, and request bodies.
severity: high
cwe: CWE-200

requests:
  - method: GET
    path: /actuator/httptrace
    headers:
      Accept: application/json
  - method: GET
    path: /trace

matchers:
  - body_contains: "\"traces\":"
  - body_contains: "\"request\":"
  - body_contains: "\"headers\":"
  - status_code: 200
