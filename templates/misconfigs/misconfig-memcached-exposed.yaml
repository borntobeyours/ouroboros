name: Memcached Exposed Without Authentication
description: Memcached server is accessible without authentication on its default port. Attackers can read all cached session data, tokens, and application cache, as well as flush the entire cache causing denial of service.
severity: high
cwe: CWE-306

requests:
  - method: GET
    path: /

matchers:
  - body_contains: "STAT version"
  - body_contains: "STAT pid"
  - regex: "STAT version [0-9\\.]+"
